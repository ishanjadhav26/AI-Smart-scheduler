name: smart_reminder_app
description: "A complete, production-ready Google Calendar + manual event scheduler and high-precision voice call reminder app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_tts: ^3.8.5
  url_launcher: ^6.2.5
  intl: ^0.18.1
  google_sign_in: ^6.2.1
  android_alarm_manager_plus: ^4.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Add assets section
  assets:
    - assets/
